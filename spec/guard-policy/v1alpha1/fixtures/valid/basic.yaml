apiVersion: guard.hashgraphonline.com/v1alpha1
kind: GuardPolicy
metadata:
  id: policy.team-defaults
  name: Team defaults
  revision: 7
  labels:
    environment: production
spec:
  defaults:
    mode: prompt
    defaultAction: warn
  rolloutState: draft
  rules:
    - id: rule.block-untrusted-install
      description: Block untrusted package installs
      enabled: true
      effect: block
      match:
        operations:
          - package.install
        harnesses:
          - claude-code
          - codex
        packages:
          - bad-package
        repositories:
          - team/example
      lifetime:
        mode: permanent
        expiresAt: null
      provenance:
        source: suggested-memory
        receiptIds:
          - receipt-001
        suggestionId: suggestion-001
        createdAt: 2026-07-15T12:00:00Z
        createdBy: user-001
