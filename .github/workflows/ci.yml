name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev --python 3.12
      - run: uv run --no-sync python -m ruff check src/
      - run: uv run --no-sync python -m ruff format --check src/
      - run: uv run --no-sync basedpyright --level error
      - name: Dead-code scan (L329)
        run: uv run --no-sync python -m ruff check src/codex_plugin_scanner/guard/ --select=F401,F811,F841
      - name: TODO/FIXME scan (L330)
        run: |
          count=$(grep -rn "TODO\|FIXME\|HACK\|XXX" src/codex_plugin_scanner/guard/ --include="*.py" | grep -v "# type: ignore" | wc -l | tr -d ' ')
          echo "Guard TODO/FIXME count: $count"
          if [ "$count" -gt "0" ]; then
            grep -rn "TODO\|FIXME\|HACK\|XXX" src/codex_plugin_scanner/guard/ --include="*.py" | grep -v "# type: ignore"
            exit 1
          fi

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        shard-index: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}
      - name: Run pytest shard ${{ matrix.shard-index }}
        shell: bash
        run: |
          files_output="$(python scripts/ci/pytest_shard.py \
            --shard-index "${{ matrix.shard-index }}" \
            --shard-count 4)"
          if [[ -z "$files_output" ]]; then
            echo "pytest shard produced no test files" >&2
            exit 1
          fi
          mapfile -t files <<< "$files_output"
          uv run --no-sync pytest "${files[@]}" --tb=short

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: "10"
      - run: cd dashboard && pnpm install --frozen-lockfile
      - run: cd dashboard && pnpm test
      - name: Dashboard build and bundle-size report (L331)
        run: |
          cd dashboard && pnpm build
          js_size=$(du -sh dist/assets/*.js 2>/dev/null | awk '{print $1}' | head -1)
          css_size=$(du -sh dist/assets/*.css 2>/dev/null | awk '{print $1}' | head -1)
          echo "Bundle JS: ${js_size:-unknown}, CSS: ${css_size:-unknown}"

  cisco-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
      - run: python3.13 -m pip install --dry-run --no-deps --require-hashes -r docker-requirements.txt
      - run: uv sync --frozen --extra dev --extra cisco --group cisco-mcp --python 3.13
      - run: uv run --no-sync pytest tests/test_cisco_install_surfaces.py tests/test_mcp_security.py tests/test_cli.py tests/test_action_runner.py tests/test_live_cisco_smoke.py --tb=short

  cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}
      - run: uv run --no-sync pytest tests/test_cli.py tests/test_verification.py tests/test_action_runner.py --tb=short
