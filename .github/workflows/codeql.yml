name: CodeQL Analysis

on:
  push:
  pull_request:
  merge_group:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Provide legacy workspace alias for CodeQL default setup state
        run: |
          LEGACY_ROOT="/home/runner/work/codex-plugin-scanner"
          mkdir -p "$LEGACY_ROOT"
          ln -sfn "$GITHUB_WORKSPACE" "$LEGACY_ROOT/codex-plugin-scanner"
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          source-root: .
          config: |
            paths-ignore:
              - src/codex_plugin_scanner/guard/stable_digest.py
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          category: /language:${{ matrix.language }}

  codeql:
    name: CodeQL
    if: ${{ always() }}
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Require every CodeQL analysis to pass
        env:
          ANALYZE_RESULT: ${{ needs.analyze.result }}
        run: |
          if [ "$ANALYZE_RESULT" != "success" ]; then
            echo "One or more CodeQL analysis jobs failed."
            exit 1
          fi
