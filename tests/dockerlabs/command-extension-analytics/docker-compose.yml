services:
  guard:
    build:
      context: ../../..
      dockerfile: tests/dockerlabs/command-extension-analytics/Dockerfile
      args:
        HOL_GUARD_LAB_WHEEL: ${HOL_GUARD_LAB_WHEEL:?set by runner}
    environment:
      HOL_GUARD_LAB_EXPECTED_VERSION: ${HOL_GUARD_LAB_EXPECTED_VERSION:?set by runner}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:${HOL_GUARD_LAB_PORT:?set by runner}:4781"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /workspace:size=32m,mode=0755,uid=10001,gid=10001
    volumes:
      - guard-state:/guard-home
    networks:
      - guard-analytics
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4781/healthz', timeout=2)"]
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  guard-state:

networks:
  guard-analytics:
    internal: true
